# Full training on ISIC dermoscopy classification (benign vs malignant).
#   python scripts/download_isic.py --out data/isic --limit 2000
#   python -m dermfeat.train --config configs/isic.yaml
data:
  kind: isic
  root: data/isic
  metadata: data/isic/metadata.json
  image_size: 224
  val_fraction: 0.2
model:
  backbone: resnet_scratch      # or a timm name e.g. "efficientnet_b0" (pip install timm)
  width: 64
  dropout: 0.2
  attributes: [asymmetry, border, color, diameter]
  malignancy_mode: fused
loss:
  w_malignancy: 1.0
  w_attributes: 0.5
  focal_gamma: 2.0
  pos_weight: 3.0
train:
  epochs: 60
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 8
  amp: true
  grad_clip: 1.0
  warmup_epochs: 3
  early_stop_patience: 12
  seed: 1402
  out_dir: runs/isic
  log_every: 50
  select_metric: auroc
